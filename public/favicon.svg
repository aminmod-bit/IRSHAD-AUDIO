<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a3a"/>
      <stop offset="100%" style="stop-color:#0d5a2a"/>
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#c9a54e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <circle cx="256" cy="180" r="80" fill="url(#moon)"/>
  <circle cx="290" cy="160" r="65" fill="#1a7a3a"/>
  <!-- Star -->
  <polygon points="256,120 262,140 284,140 266,152 272,172 256,160 240,172 246,152 228,140 250,140" fill="url(#moon)" opacity="0.9"/>
  <!-- Text IRSHAD -->
  <text x="256" y="340" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="88" fill="#ffffff" letter-spacing="8">IRSHAD</text>
  <!-- Subtle line -->
  <rect x="140" y="360" width="232" height="3" rx="1.5" fill="#c9a54e" opacity="0.5"/>
</svg>
